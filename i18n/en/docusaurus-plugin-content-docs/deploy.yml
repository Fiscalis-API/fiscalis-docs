# Fichier : .github/workflows/deploy.yml

name: Déployer la documentation sur GitHub Pages

on:
  # Se déclenche à chaque push sur la branche `main`
  push:
    branches: [main]
  # Permet de lancer ce workflow manuellement depuis l'onglet Actions de GitHub
  workflow_dispatch:

# Autorisations spéciales pour que l'action puisse déployer sur GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Permet un seul déploiement concurrent à la fois, annulant les exécutions précédentes
concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  # Tâche de build
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
      - name: Configuration de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18 # ou la version que vous utilisez
          cache: 'npm'
      - name: Installation des dépendances
        run: npm ci
      - name: Build du site Docusaurus
        run: npm run build
      - name: Configuration de GitHub Pages
        uses: actions/configure-pages@v4
      - name: Téléversement de l'artefact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./build

  # Tâche de déploiement
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Déploiement sur GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4